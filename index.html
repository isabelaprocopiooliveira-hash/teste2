<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achadinhos Vivi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Achadinhos Vivi</h1>
    <p>Brechó Online • Moda com História</p>
  </header>

  <nav>
    <a href="index.html">Início</a>
    <a href="cliente.html">Clientes</a>
    <a href="estoque.html">Estoque</a>
    <a href="financeiro.html">Vendas</a>
  </nav>

  <div class="container">
    <div class="form-box">
      <h2>Bem-vinda ao Achadinhos Vivi</h2>
      <p style="text-align:center; font-size:1.1rem; margin:30px 0;">
        Gerencie seu brechó de forma simples e elegante
      </p>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;">
        <div class="card-box" style="text-align:center; cursor:pointer;" onclick="window.location='cliente.html'">
          <h3>Clientes</h3>
          <p>Cadastrar e gerenciar clientes</p>
        </div>
        <div class="card-box" style="text-align:center; cursor:pointer;" onclick="window.location='estoque.html'">
          <h3>Estoque</h3>
          <p>Gerenciar produtos e fotos</p>
        </div>
        <div class="card-box" style="text-align:center; cursor:pointer;" onclick="window.location='financeiro.html'">
          <h3>Vendas</h3>
          <p>Registrar novas vendas</p>
        </div>
      </div>
    </div>

    <button class="btn-voltar" onclick="window.location='index.html'">Voltar ao Início</button>
  </div>

</body>
</html>
