<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Cadastro de Cliente</h1>

    <form id="formCadastro" action="salvar_cliente.php" method="post">

      <div class="form-group">
        <label for="nome">Nome completo / Razão Social:</label>
        <input type="text" id="nome" name="nome" required>
      </div>

      <div class="form-group">
        <label for="documento">CPF / CNPJ:</label>
        <input type="text" id="documento" name="documento" placeholder="000.000.000-00 ou 00.000.000/0001-00" maxlength="18" required>
        <span id="erro-documento" class="erro">Documento inválido</span>
      </div>

      <div class="form-group">
        <label for="data_nascimento">Data de nascimento:</label>
        <input type="date" id="data_nascimento" name="data_nascimento">
      </div>

      <div class="form-group">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone / WhatsApp:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(41) 99999-9999" maxlength="15">
      </div>

      <div class="form-group">
        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9">
      </div>

      <!-- Campo único concatenado -->
      <div class="form-group">
        <label for="endereco_completo"ml lang="pt-br">
<>Endereço completo:</label>
        <input type="text" id="endereco_completo" name="endereco_completo" placeholder="Rua Exemplo, 123 - Ap 45 - Centro - Curitiba/PR">
      </div>

      <div class="buttons">
        <button type="submit">Cadastrar Cliente</button>
        <button type="button" onclick="window.location.href='lista-clientes.html'">Ver Clientes Cadastrados</button>
      </div>

    </form>
  </div>

  <script>
    // Máscara Documento (CPF ou CNPJ)
    document.getElementById('documento').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length <= 11) {
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})/, '$1-$2');
      } else {
        v = v.replace(/^(\d{2})(\d)/, '$1.$2');
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
      }
      e.target.value = v;
    });

    // Máscara Telefone
    document.getElementById('telefone').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length <= 10) {
        v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
      } else if (v.length === 11) {
        v = v.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
      }
      e.target.value = v.slice(0, 15);
    });

    // Máscara CEP + busca automática (agora mais robusta)
    const cepInput = document.getElementById('cep');
    const enderecoInput = document.getElementById('endereco_completo');

    cepInput.addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '').replace(/^(\d{5})(\d)/, '$1-$2');
      e.target.value = v.slice(0, 9);
    });

    // Dispara ao sair do campo OU após digitar 8 números
    function buscarEndereco() {
      let cep = cepInput.value.replace(/\D/g, '');
      
      if (cep.length !== 8) return;

      cepInput.disabled = true; // evita múltiplas chamadas
      enderecoInput.value = "Buscando endereço...";

      fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(response => {
          if (!response.ok) throw new Error('Erro na rede');
          return response.json();
        })
        .then(dados => {
          if (dados.erro) {
            enderecoInput.value = "CEP não encontrado";
            alert("CEP não encontrado. Verifique e digite novamente.");
          } else {
            // Monta o endereço completo
            let endereco = '';
            if (dados.logradouro) endereco += dados.logradouro;
            if (dados.logradouro) endereco += ', '; // vírgula se tiver logradouro
            // Número e complemento ficam em branco (usuário preenche depois)
            if (dados.bairro) endereco += dados.bairro + ' - ';
            if (dados.localidade) endereco += dados.localidade;
            if (dados.uf) endereco += '/' + dados.uf;

            enderecoInput.value = endereco.trim();
          }
        })
        .catch(erro => {
          console.error(erro);
          enderecoInput.value = "Erro ao buscar endereço";
          alert("Não foi possível consultar o CEP. Verifique sua conexão.");
        })
        .finally(() => {
          cepInput.disabled = false;
        });
    }

    cepInput.addEventListener('blur', buscarEndereco);
    // Bônus: se digitar exatamente 9 caracteres (com traço) → busca também
    cepInput.addEventListener('input', function() {
      if (this.value.replace(/\D/g, '').length === 8) {
        buscarEndereco();
      }
    });
  </script>

</body>
</html
