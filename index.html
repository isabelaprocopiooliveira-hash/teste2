<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Clientes - Universo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0015;
      color: #e0e0ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(180,180,255,0.07) 1px, transparent 1px),
        radial-gradient(circle at 85% 30%, rgba(200,200,255,0.05) 1px, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(220,220,255,0.06) 1px, transparent 1px);
      background-size: 60px 60px, 80px 80px, 100px 100px;
      position: relative;
    }

    /* Estrelas piscando */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: transparent;
      animation: twinkle 8s infinite alternate;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.4; }
      50%     { opacity: 0.9; }
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    h1 {
      text-align: center;
      margin: 40px 0 50px;
      font-size: 2.6rem;
      color: #f0f0ff;
      text-shadow: 0 0 20px rgba(180,180,255,0.4);
      letter-spacing: 2px;
    }

    .form-card {
      background: rgba(20, 15, 45, 0.65);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(120,120,255,0.18);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 50px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #c0c0ff;
      font-weight: 500;
    }

    input, button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid rgba(140,140,255,0.3);
      background: rgba(30,25,60,0.5);
      color: white;
      font-size: 1rem;
      transition: all 0.25s;
    }

    input:focus {
      outline: none;
      border-color: #a0a0ff;
      box-shadow: 0 0 12px rgba(160,160,255,0.4);
      background: rgba(40,35,70,0.7);
    }

    button {
      background: linear-gradient(90deg, #4a4aff, #7a7aff);
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(100,100,255,0.4);
    }

    .clients-list {
      background: rgba(15,10,40,0.6);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(100,100,255,0.15);
      border-radius: 16px;
      padding: 24px;
      min-height: 300px;
    }

    .client-item {
      background: rgba(30,25,60,0.4);
      border-left: 4px solid #8080ff;
      margin: 12px 0;
      padding: 16px;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .client-item:hover {
      transform: translateX(8px);
      background: rgba(40,35,70,0.6);
      box-shadow: 0 4px 20px rgba(80,80,200,0.3);
    }

    .client-name {
      font-size: 1.25rem;
      color: #e0e0ff;
      margin-bottom: 6px;
    }

    .client-info {
      color: #b0b0ff;
      font-size: 0.95rem;
    }

    .no-clients {
      text-align: center;
      color: #8888aa;
      padding: 60px 20px;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="stars"></div>

<div class="container">
  <h1>Cadastro de Clientes</h1>

  <div class="form-card">
    <form id="clientForm">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" required placeholder="Ex: Isabela Costa"/>
      </div>
      
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required placeholder="exemplo@universo.com"/>
      </div>
      
      <div class="form-group">
        <label for="telefone">Telefone / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(41) 9 9999-9999"/>
      </div>
      
      <button type="submit">Cadastrar Cliente</button>
    </form>
  </div>

  <div class="clients-list" id="clientsList">
    <div class="no-clients">Nenhum cliente cadastrado ainda...</div>
  </div>
</div>

<script>
  const form = document.getElementById('clientForm');
  const clientsList = document.getElementById('clientsList');
  let clients = JSON.parse(localStorage.getItem('clients')) || [];

  function renderClients() {
    if (clients.length === 0) {
      clientsList.innerHTML = `<div class="no-clients">Nenhum cliente cadastrado ainda...</div>`;
      return;
    }

    let html = '';
    clients.forEach(client => {
      html += `
        <div class="client-item">
          <div class="client-name">${client.nome}</div>
          <div class="client-info">📧 ${client.email}</div>
          ${client.telefone ? `<div class="client-info">📱 ${client.telefone}</div>` : ''}
        </div>
      `;
    });
    clientsList.innerHTML = html;
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const telefone = document.getElementById('telefone').value.trim();

    if (!nome || !email) return;

    clients.push({ nome, email, telefone });
    localStorage.setItem('clients', JSON.stringify(clients));
    
    renderClients();
    form.reset();
  });

  // Carregar clientes ao abrir a página
  renderClients();
</script>

</body>
</html>
