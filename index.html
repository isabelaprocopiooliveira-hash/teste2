<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>
</head>
<body>

  <h1>Cadastro de Cliente</h1>

  <form action="" method="post">

    <p>
      <label for="nome">Nome completo:</label><br>
      <input type="text" id="nome" name="nome" required>
    </p>

    <p>
      <label for="cpf">CPF:</label><br>
      <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14">
    </p>

    <p>
      <label for="data_nascimento">Data de nascimento:</label><br>
      <input type="date" id="data_nascimento" name="data_nascimento">
    </p>

    <p>
      <label for="email">E-mail:</label><br>
      <input type="email" id="email" name="email" required>
    </p>

    <p>
      <label for="telefone">Telefone / WhatsApp:</label><br>
      <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
    </p>

    <p>
      <label for="endereco">Endereço:</label><br>
      <input type="text" id="endereco" name="endereco">
    </p>

    <p>
      <label for="cidade">Cidade:</label><br>
      <input type="text" id="cidade" name="cidade">
    </p>

    <p>
      <label for="estado">Estado:</label><br>
      <select id="estado" name="estado">
        <option value="">Selecione</option>
        <option value="AC">Acre</option>
        <option value="AL">Alagoas</option>
        <option value="AP">Amapá</option>
        <option value="AM">Amazonas</option>
        <option value="BA">Bahia</option>
        <option value="CE">Ceará</option>
        <option value="DF">Distrito Federal</option>
        <option value="ES">Espírito Santo</option>
        <option value="GO">Goiás</option>
        <option value="MA">Maranhão</option>
        <option value="MT">Mato Grosso</option>
        <option value="MS">Mato Grosso do Sul</option>
        <option value="MG">Minas Gerais</option>
        <option value="PA">Pará</option>
        <option value="PB">Paraíba</option>
        <option value="PR" selected>Paraná</option>
        <option value="PE">Pernambuco</option>
        <option value="PI">Piauí</option>
        <option value="RJ">Rio de Janeiro</option>
        <option value="RN">Rio Grande do Norte</option>
        <option value="RS">Rio Grande do Sul</option>
        <option value="RO">Rondônia</option>
        <option value="RR">Roraima</option>
        <option value="SC">Santa Catarina</option>
        <option value="SP">São Paulo</option>
        <option value="SE">Sergipe</option>
        <option value="TO">Tocantins</option>
      </select>
    </p>

    <p>
      <label for="observacoes">Observações:</label><br>
      <textarea id="observacoes" name="observacoes" rows="4" cols="50"></textarea>
    </p>

    <p>
      <button type="submit">Cadastrar</button>
      <button type="reset">Limpar formulário</button>
    </p>

  </form>

</body>
</html>
