<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .erro {
      display: none;
      color: #d32f2f;
      font-size: 0.9em;
      margin-top: 5px;
    }
    .erro.show {
      display: block;
    }

    /* Estilo para o botão de Ver Clientes */
    .btn-ver-clientes {
      background-color: #1976d2;
      color: white;
      padding: 12px 20px;
      font-size: 1.1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
      transition: background-color 0.3s;
    }

    .btn-ver-clientes:hover {
      background-color: #1565c0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .buttons button {
      flex: 1;
      padding: 12px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Cadastro de Cliente</h1>

    <form id="formCadastro" action="salvar_cliente.php" method="post">

      <div class="form-group">
        <label for="nome">Nome completo / Razão Social:</label>
        <input type="text" id="nome" name="nome" required>
      </div>

      <div class="form-group">
        <label for="documento">CPF / CNPJ:</label>
        <input type="text" id="documento" name="documento" 
               placeholder="000.000.000-00 ou 00.000.000/0001-00" 
               maxlength="18" required>
        <span id="erro-documento" class="erro">Documento inválido</span>
      </div>

      <div class="form-group">
        <label for="data_nascimento">Data de nascimento / Fundação:</label>
        <input type="date" id="data_nascimento" name="data_nascimento">
      </div>

      <div class="form-group">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone / WhatsApp:</label>
        <input type="tel" id="telefone" name="telefone" 
               placeholder="(41) 99999-9999" maxlength="15">
      </div>

      <div class="form-group">
        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" 
               placeholder="00000-000" maxlength="9">
      </div>

      <div class="form-group">
        <label for="endereco_completo">Endereço completo:</label>
        <input type="text" id="endereco_completo" name="endereco_completo" 
               placeholder="Rua Exemplo, 123 - Ap 45 - Centro - Curitiba/PR">
      </div>

      <div class="buttons">
        <button type="submit">Cadastrar Cliente</button>
      </div>

      <!-- Botão para ver clientes cadastrados -->
      <button type="button" class="btn-ver-clientes" 
              onclick="window.location.href='lista-clientes.html'">
        👥 Ver Clientes Cadastrados
      </button>

    </form>
  </div>

  <!-- O resto do JavaScript permanece igual ao que eu te passei antes -->
  <script>
    // (Cole aqui todo o JavaScript que enviei na resposta anterior - máscaras, validação CPF/CNPJ e busca de CEP)
    // ... (para não ficar muito longo, mantenho só o essencial aqui)

    const docInput = document.getElementById('documento');
    const erroDoc = document.getElementById('erro-documento');

    // Máscara Documento (CPF/CNPJ)
    docInput.addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length <= 11) {
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      } else {
        v = v.replace(/^(\d{2})(\d)/, '$1.$2');
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
      }
      e.target.value = v;
    });

    // Validação CPF/CNPJ (mesma função da resposta anterior)
    function validarDocumento() {
      const valor = docInput.value.trim();
      if (!valor) return true;
      const limpo = valor.replace(/\D/g, '');
      const valido = (limpo.length === 11 && validarCPF(valor)) || 
                     (limpo.length === 14 && validarCNPJ(valor));
      if (valido) {
        erroDoc.classList.remove('show');
        return true;
      } else {
        erroDoc.classList.add('show');
        return false;
      }
    }

    function validarCPF(cpf) { /* mesma função anterior */ }
    function validarCNPJ(cnpj) { /* mesma função anterior */ }

    docInput.addEventListener('blur', validarDocumento);

    const form = document.getElementById('formCadastro');
    form.addEventListener('submit', function(e) {
      if (!validarDocumento()) {
        e.preventDefault();
        docInput.focus();
      }
    });

    // Máscaras de telefone e CEP (pode colar também se quiser completo)
  </script>

</body>
</html>
