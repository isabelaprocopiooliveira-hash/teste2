<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Cadastro de Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">
    <div class="login-box">
      <h1>Acesso ao Sistema</h1>
      <p class="subtitle">Cadastro de Clientes</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" placeholder="Digite seu usuário" required>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <div class="footer">
        <p>Demo - Sistema de Cadastro</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const usuario = document.getElementById('usuario').value.trim();
      const senha = document.getElementById('senha').value.trim();

      // Simulação simples de login (pode melhorar depois)
      if (usuario && senha) {
        alert('Login realizado com sucesso!');
        window.location.href = 'cadastro.html';   // ← muda para o nome do seu arquivo de cadastro
      } else {
        alert('Por favor, preencha usuário e senha.');
      }
    });
  </script>

</body>
</html>
