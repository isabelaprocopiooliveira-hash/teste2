<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Clientes - Universo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <div class="container">
    <h1>Cadastro de Clientes</h1>

    <form id="clienteForm">
      <div class="form-group">
        <label for="nome">Nome completo *</label>
        <input type="text" id="nome" required placeholder="Digite o nome completo">
      </div>

      <div class="form-group">
        <label for="email">E-mail *</label>
        <input type="email" id="email" required placeholder="exemplo@dominio.com">
      </div>

      <div class="form-group">
        <label for="cpf">CPF *</label>
        <input type="text" id="cpf" maxlength="14" required placeholder="000.000.000-00">
      </div>

      <div class="form-group">
        <label for="cep">CEP *</label>
        <input type="text" id="cep" maxlength="9" required placeholder="00000-000">
      </div>

      <div class="form-group">
        <label for="rua">Rua / Avenida</label>
        <input type="text" id="rua" placeholder="Preenchido automaticamente pelo CEP" readonly>
      </div>

      <div class="form-group">
        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" placeholder="Preenchido automaticamente" readonly>
      </div>

      <div class="form-group">
        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" placeholder="Preenchido automaticamente" readonly>
      </div>

      <div class="form-group">
        <label for="uf">Estado (UF)</label>
        <input type="text" id="uf" maxlength="2" placeholder="Preenchido automaticamente" readonly>
      </div>

      <div class="form-group">
        <label for="pais">País</label>
        <input type="text" id="pais" value="Brasil" placeholder="Brasil" readonly>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(41) 99999-9999">
      </div>

      <button type="submit">Cadastrar Cliente</button>
    </form>

    <div class="lista-clientes">
      <h2>Clientes Cadastrados</h2>
      <div id="clientesContainer">
        <!-- Os clientes aparecem aqui -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
