<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente - Achadinhos da Vivi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>♻️ Achadinhos da Vivi</h1>
        <p>Cadastro de Clientes</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="cliente.html">Clientes</a></li>
            <li><a href="estoque.html">Estoque</a></li>
            <li><a href="financeiro.html">Vendas</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Cadastrar Novo Cliente</h2>
            <form id="clienteForm">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: Maria Silva" required>

                <label>Telefone (WhatsApp)</label>
                <input type="tel" id="telefone" placeholder="(41) 99999-9999" required>

                <label>E-mail</label>
                <input type="email" id="email" placeholder="maria@email.com">

                <label>Endereço</label>
                <textarea id="endereco" rows="3" placeholder="Rua, número, bairro, cidade"></textarea>

                <button type="submit">Cadastrar Cliente</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Achadinhos da Vivi</p>
    </footer>

    <script>
        document.getElementById('clienteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Cliente cadastrado com sucesso! 🎉');
            this.reset();
        });
    </script>
</body>
</html>
